{% extends "base.html" %}
{% block title %}Log Weight - NB Fitness{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Log Weight</h1>

<form method="post" action="{{ url_for('weight.create_post') }}" class="card p-3">
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input class="form-control" type="date" name="entry_date" value="{{ selected_date.strftime('%Y-%m-%d') }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Weight (kg)</label>
    <input class="form-control" type="number" step="0.1" name="weight_kg" placeholder="e.g. 84.5" required>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('weight.index') }}">Cancel</a>
  </div>
</form>
{% endblock %}
