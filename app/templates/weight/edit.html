{% extends "base.html" %}
{% block title %}Edit Weight - NB Fitness{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Edit Weight</h1>

<form method="post" action="{{ url_for('weight.edit_post', entry_id=entry.id) }}" class="card p-3">
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input class="form-control" type="text" value="{{ entry.entry_date.strftime('%d %b %Y') }}" disabled>
  </div>

  <div class="mb-3">
    <label class="form-label">Weight (kg)</label>
    <input class="form-control" type="number" step="0.1" name="weight_kg" value="{{ entry.weight_kg }}" required>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Update</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('weight.index') }}">Cancel</a>
  </div>
</form>
{% endblock %}
