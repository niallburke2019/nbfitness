{% extends "base.html" %}
{% block title %}Macro Goals - NB Fitness{% endblock %}

{% block content %}
<div class="nb-page-header">
  <div>
    <h1 class="display-6 nb-page-title mb-1">Macro Goals</h1>
    <p class="nb-page-subtitle">Set your daily targets.</p>
  </div>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-secondary" href="{{ url_for('meals.day_view') }}">Back</a>
  </div>
</div>

<form method="post" class="card nb-card p-4 shadow-sm" style="max-width: 820px;">
  <div class="row g-3">
    <div class="col-md-3">
      <label class="form-label">Calories</label>
      <input class="form-control" type="number" min="0" name="calories_target"
             value="{{ goal.calories_target if goal else 0 }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Protein (g)</label>
      <input class="form-control" type="number" step="0.1" min="0" name="protein_target_g"
             value="{{ goal.protein_target_g if goal else 0 }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Carbs (g)</label>
      <input class="form-control" type="number" step="0.1" min="0" name="carbs_target_g"
             value="{{ goal.carbs_target_g if goal else 0 }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Fat (g)</label>
      <input class="form-control" type="number" step="0.1" min="0" name="fat_target_g"
             value="{{ goal.fat_target_g if goal else 0 }}">
    </div>

    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary" type="submit">Save Goals</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('meals.day_view') }}">Cancel</a>
    </div>

    <div class="col-12">
      <p class="text-muted small mb-0">
        Tip: set goals to 0 if you don’t want to track that metric.
      </p>
    </div>
  </div>
</form>
{% endblock %}
