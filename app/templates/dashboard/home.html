{% extends "base.html" %}
{% block content %}
  <h1>Welcome to NB Fitness</h1>
  <p>A simple platform for tracking workouts, meals, and progress.</p>

  {% if current_user.is_authenticated %}
    <p>You are logged in as <strong>{{ current_user.email }}</strong>.</p>
    <a class="btn" href="{{ url_for('dash.dashboard') }}">Go to Dashboard</a>
  {% else %}
    <a class="btn" href="{{ url_for('auth.login') }}">Login</a>
    <a class="btn secondary" href="{{ url_for('auth.register') }}">Create Account</a>
  {% endif %}
{% endblock %}
