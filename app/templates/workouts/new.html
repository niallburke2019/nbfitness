{% extends "base.html" %}
{% block content %}

<h1>Create workout</h1>

<form method="post" class="mt-3" style="max-width: 720px;">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input name="title" class="form-control" placeholder="e.g. Push Day" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Date</label>
    <input name="workout_date" type="date" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Notes (optional)</label>
    <textarea name="notes" class="form-control" rows="3" placeholder="Any notes..."></textarea>
  </div>

  <button class="btn btn-primary">Create</button>
  <a class="btn btn-outline-secondary" href="{{ url_for('workouts.list_workouts') }}">Cancel</a>
</form>

{% endblock %}
