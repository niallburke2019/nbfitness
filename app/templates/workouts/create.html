{% extends "base.html" %}
{% block title %}Create Workout - NB Fitness{% endblock %}

{% block content %}
<h1>Create workout</h1>

<form id="workoutForm" method="post" class="mt-3 card p-4 shadow-sm" style="max-width: 900px;">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Title</label>
      <input name="title" class="form-control" placeholder="e.g. Push Day" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Date</label>
      <input name="workout_date" type="date" class="form-control" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Duration (mins)</label>
      <input name="duration_minutes" type="number" class="form-control" min="0" value="0">
    </div>

    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center">
        <label class="form-label mb-0">Exercises</label>
        <button class="btn btn-outline-primary btn-sm" type="button" id="addExerciseBtn">+ Add exercise</button>
      </div>
      <div class="form-text mb-2">Enter exercise name + weight/reps/sets. Sets creates that many identical sets.</div>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>Exercise</th>
              <th style="width:140px;">Weight</th>
              <th style="width:120px;">Reps</th>
              <th style="width:120px;">Sets</th>
              <th style="width:80px;"></th>
            </tr>
          </thead>
          <tbody id="exerciseTableBody">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>

      <textarea name="exercise_lines" id="exercise_lines" class="d-none"></textarea>

      <div class="form-text">
        Stored format: <strong>Exercise | weight | reps | sets</strong>
      </div>
    </div>

    <div class="col-12">
      <label class="form-label">Notes (optional)</label>
      <textarea name="notes" class="form-control" rows="3" placeholder="Any notes..."></textarea>
    </div>

    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary">Create</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('workouts.list_workouts') }}">Cancel</a>
    </div>
  </div>
</form>

<script>
(function () {
  const tbody = document.getElementById("exerciseTableBody");
  const addBtn = document.getElementById("addExerciseBtn");
  const hidden = document.getElementById("exercise_lines");
  const form = document.getElementById("workoutForm");

  function makeRow({ name = "", weight = "", reps = "", sets = "" } = {}) {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input class="form-control form-control-sm" type="text" placeholder="e.g. Squat" value="${escapeHtml(name)}"></td>
      <td><input class="form-control form-control-sm" type="number" step="0.5" min="0" placeholder="kg" value="${escapeAttr(weight)}"></td>
      <td><input class="form-control form-control-sm" type="number" min="0" placeholder="reps" value="${escapeAttr(reps)}"></td>
      <td><input class="form-control form-control-sm" type="number" min="0" placeholder="sets" value="${escapeAttr(sets)}"></td>
      <td class="text-end">
        <button type="button" class="btn btn-outline-danger btn-sm">Remove</button>
      </td>
    `;

    tr.querySelector("button").addEventListener("click", () => {
      tr.remove();
    });

    tbody.appendChild(tr);
  }

  function rowsToLines() {
    const lines = [];
    const rows = tbody.querySelectorAll("tr");
    rows.forEach(row => {
      const inputs = row.querySelectorAll("input");
      const name = (inputs[0].value || "").trim();
      const weight = (inputs[1].value || "").trim();
      const reps = (inputs[2].value || "").trim();
      const sets = (inputs[3].value || "").trim();

      if (!name) return;
      lines.push(`${name} | ${weight} | ${reps} | ${sets}`);
    });
    return lines.join("\n");
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
  function escapeAttr(str) {
    return escapeHtml(str);
  }

  addBtn.addEventListener("click", () => makeRow());
  form.addEventListener("submit", () => {
    hidden.value = rowsToLines();
  });

  // start with one blank row
  makeRow();
})();
</script>
{% endblock %}
